openapi: "3.1.0"
info:
  title: GraphEd API
  version: "1.0.0"
  description: |
    GraphEd REST API contract.
    All endpoints must be implemented exactly as specified here.
    Any change to a path, method, request body, or response shape
    requires an explicit version bump and a CHANGELOG entry.

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://{project}.vercel.app/api
    description: Vercel preview / production
    variables:
      project:
        default: graphed

tags:
  - name: users
    description: Authenticated user operations
  - name: topics
    description: Topic curation operations

paths:
  /users:
    get:
      operationId: getCurrentUser
      summary: Get the authenticated user's profile
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/Profile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /topics:
    get:
      operationId: listTopics
      summary: List topics for the authenticated user
      tags: [topics]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of topics
          content:
            application/json:
              schema:
                type: object
                required: [topics]
                properties:
                  topics:
                    type: array
                    items:
                      $ref: "#/components/schemas/Topic"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createTopic
      summary: Create a new topic
      tags: [topics]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTopicInput"
      responses:
        "201":
          description: Topic created
          content:
            application/json:
              schema:
                type: object
                required: [topic]
                properties:
                  topic:
                    $ref: "#/components/schemas/Topic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Profile:
      type: object
      required: [id, created_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Topic:
      type: object
      required: [id, title, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
          maxLength: 2000
        status:
          type: string
          enum: [draft, published, archived]
        created_at:
          type: string
          format: date-time

    CreateTopicInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
